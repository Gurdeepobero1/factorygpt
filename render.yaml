# ──────────────────────────────────────────────────────────────────────────────
# Render Blueprint — auto-deploys the Cloud Broker on git push.
# After connecting the repo on Render, this file drives the whole setup.
# ──────────────────────────────────────────────────────────────────────────────
services:
  - type: web
    name: factorygpt-cloud
    runtime: python
    plan: free                       # upgrade to starter ($7/mo) to avoid cold starts
    buildCommand: "pip install -r requirements-cloud.txt"
    startCommand: "uvicorn cloud_backend:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      # Primary LLM (pick any one; auto-fallback uses any that are set)
      - key: SARVAM_API_KEY          # Sarvam-M (default provider)
        sync: false
      - key: ANTHROPIC_API_KEY       # Claude Sonnet 4.5 (highest quality)
        sync: false
      - key: OPENAI_API_KEY          # GPT-4o (alternate fallback)
        sync: false
      - key: LLM_PROVIDER            # "sarvam" | "anthropic" | "openai"
        value: "sarvam"
      # Auth + CORS
      - key: FACTORYGPT_API_KEY
        generateValue: true          # Render auto-generates a random key
      - key: ALLOWED_ORIGINS
        sync: false                  # e.g. https://your-app.vercel.app
      - key: PYTHON_VERSION
        value: "3.11.9"
